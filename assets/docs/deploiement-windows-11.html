<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Documentation deploiement-windows-11</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="viewer.css" />
</head>
<body>
  <main class="container">
    <div class="toolbar">
      <h1>Documentation: deploiement-windows-11</h1>
      <a class="btn" href="#" id="back-to-projects">Retour aux projets</a>
    </div>
    <section class="viewer">
        <object data="deploiement-windows-11.pdf" type="application/pdf">
          <div class="fallback">
            Impossible d'afficher le PDF ici. Ouvre-le directement:
            <a href="deploiement-windows-11.pdf">deploiement-windows-11.pdf</a>
          </div>
        </object>
      </section>
  </main>
  <script>
    const backBtn = document.getElementById("back-to-projects");

    const goProjects = () => {
      const marker = "/assets/docs/";
      const path = window.location.pathname;
      const idx = path.lastIndexOf(marker);

      if (idx !== -1) {
        const rootPath = path.slice(0, idx);
        if (window.location.protocol === "file:") {
          window.location.href = "file://" + rootPath + "/index.html#projets";
          return;
        }
        const target = window.location.origin + rootPath + "/index.html#projets";
        window.location.href = target;
        return;
      }

      window.location.href = "../../index.html#projets";
    };

    if (backBtn) {
      backBtn.addEventListener("click", function (event) {
        event.preventDefault();
        if (window.history.length > 1) {
          window.history.back();
          return;
        }
        goProjects();
      });
    }
  </script>
</body>
</html>
